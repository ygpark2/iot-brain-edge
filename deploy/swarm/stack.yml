version: "3.9"

services:
  kafka:
    image: apache/kafka:4.1.1
    networks:
      - brain-net
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      # ---- KRaft single-node
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # ---- Listeners
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # ---- Single-node friendly
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1

      # ---- Dev convenience
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_NUM_PARTITIONS=3

    ports:
      # External access from host (colima-safe)
      - target: 9094
        published: 9094
        protocol: tcp
        mode: host

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    networks:
      - brain-net
    ports:
      - target: 8080
        published: 8089
        protocol: tcp
        mode: host
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-swarm
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    entrypoint: sh -c "mkdir -p /data/brain && /usr/bin/docker-entrypoint.sh server /data --console-address ':9001'"
    networks:
      - brain-net
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  clickhouse:
    image: clickhouse/clickhouse-server:latest-alpine
    networks:
      - brain-net
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/config/storage.xml:/etc/clickhouse-server/config.d/storage.xml
    environment:
      CLICKHOUSE_DB: brain
      CLICKHOUSE_USER: brain
      CLICKHOUSE_PASSWORD: brain
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - target: 8123
        published: 8123
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: '1'
          memory: 2G
      placement:
        constraints:
          - node.role == manager

  processor-service:
    image: ainsoft/brain-processor:latest
    networks:
      - brain-net
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_INPUT_TOPIC=rawframes
      - KAFKA_OUTPUT_RAW_TOPIC=rawframes-processed
      - KAFKA_OUTPUT_FEATURES_TOPIC=session-features
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    depends_on:
      - kafka

  notebook:
    image: jupyter/pyspark-notebook:latest
    networks:
      - brain-net
    environment:
      - JUPYTER_TOKEN=brain
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - notebooks-data:/home/jovyan/work
    ports:
      - target: 8888
        published: 8888
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  ingestion-service:
    image: ainsoft/brain-ingestion:latest
    networks:
      - brain-net
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CLICKHOUSE_HTTP_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=brain
      - CLICKHOUSE_PASSWORD=brain
    ports:
      - target: 8082
        published: 8082
        protocol: tcp
        mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
    depends_on:
      - kafka
      - clickhouse

  dashboard:
    image: node:24-alpine
    working_dir: /app
    networks:
      - brain-net
    volumes:
      - ../../dashboard:/app

    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - target: 5173
        published: 5173
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  brain-net:
    external: true

volumes:
  kafka-data:
  clickhouse_data:
  clickhouse_logs:
  notebooks-data:
  minio_data:

